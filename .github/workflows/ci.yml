name: CI

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: |
          pip install flake8 flake8-bugbear

      - name: Run flake8
        run: |
          flake8 . \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=.git,.venv,venv,env,__pycache__

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install requests python-dotenv
          pip install pytest

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
